<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Advanced QR-Based Attendance System for educational institutions">
    <title>{% block title %}QR Attendance System{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* ─── CSS RESET & VARIABLES ───────────────────────────── */
        *, *::before, *::after {
            margin: 0; padding: 0; box-sizing: border-box;
        }

        :root {
            --bg-primary: #0a0a1a;
            --bg-secondary: #111128;
            --bg-card: #16163a;
            --bg-card-hover: #1c1c4a;
            --bg-input: #1a1a3e;
            --bg-glass: rgba(22, 22, 58, 0.7);

            --accent-primary: #6c63ff;
            --accent-secondary: #a78bfa;
            --accent-glow: rgba(108, 99, 255, 0.3);
            --accent-success: #10b981;
            --accent-success-glow: rgba(16, 185, 129, 0.3);
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            --accent-danger-glow: rgba(239, 68, 68, 0.2);
            --accent-info: #3b82f6;

            --text-primary: #f0f0ff;
            --text-secondary: #a0a0cc;
            --text-muted: #6b6b99;

            --border: rgba(108, 99, 255, 0.15);
            --border-hover: rgba(108, 99, 255, 0.35);

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 20px;

            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 4px 20px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 8px 40px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 30px var(--accent-glow);

            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: all 0.15s ease;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.6;
        }

        /* ─── ANIMATED BACKGROUND ─────────────────────────────── */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(108, 99, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(167, 139, 250, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(59, 130, 246, 0.04) 0%, transparent 60%);
            z-index: -1;
            animation: bgShift 20s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        /* ─── SIDEBAR ─────────────────────────────────────────── */
        .sidebar {
            position: fixed;
            left: 0; top: 0;
            width: 260px;
            height: 100vh;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 100;
            transition: var(--transition);
        }

        .sidebar-brand {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand-icon {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .brand-icon i {
            color: white;
            width: 22px; height: 22px;
        }

        .brand-text {
            font-weight: 700;
            font-size: 16px;
            letter-spacing: -0.3px;
        }

        .brand-text span {
            display: block;
            font-size: 11px;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 0;
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 12px;
            overflow-y: auto;
        }

        .nav-section {
            margin-bottom: 24px;
        }

        .nav-section-title {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            padding: 0 12px;
            margin-bottom: 8px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
            position: relative;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: var(--bg-card);
        }

        .nav-link.active {
            color: var(--accent-primary);
            background: rgba(108, 99, 255, 0.1);
        }

        .nav-link.active::before {
            content: '';
            position: absolute;
            left: 0; top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 60%;
            background: var(--accent-primary);
            border-radius: 0 3px 3px 0;
        }

        .nav-link i {
            width: 20px; height: 20px;
            flex-shrink: 0;
        }

        .nav-badge {
            margin-left: auto;
            background: var(--accent-primary);
            color: white;
            font-size: 11px;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 10px;
            min-width: 22px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
        }

        .sidebar-footer p {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
        }

        /* ─── MAIN CONTENT ────────────────────────────────────── */
        .main-content {
            margin-left: 260px;
            min-height: 100vh;
            padding: 0;
        }

        /* ─── TOP BAR ─────────────────────────────────────────── */
        .topbar {
            position: sticky;
            top: 0;
            background: rgba(10, 10, 26, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 50;
        }

        .topbar-title {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .topbar-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--text-muted);
            padding: 6px 14px;
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        /* ─── PAGE CONTENT ────────────────────────────────────── */
        .page-content {
            padding: 32px;
        }

        /* ─── CARDS ───────────────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: var(--transition);
        }

        .card:hover {
            border-color: var(--border-hover);
            box-shadow: var(--shadow-md);
        }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title i {
            width: 20px; height: 20px;
            color: var(--accent-primary);
        }

        .card-body {
            padding: 24px;
        }

        /* ─── STAT CARDS ──────────────────────────────────────── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            transition: var(--transition);
            position: relative;
            overflow: hidden;
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
        }

        .stat-card.purple::before { background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary)); }
        .stat-card.green::before { background: linear-gradient(90deg, #10b981, #34d399); }
        .stat-card.blue::before { background: linear-gradient(90deg, #3b82f6, #60a5fa); }
        .stat-card.amber::before { background: linear-gradient(90deg, #f59e0b, #fbbf24); }

        .stat-card:hover {
            transform: translateY(-2px);
            border-color: var(--border-hover);
            box-shadow: var(--shadow-md);
        }

        .stat-icon {
            width: 44px; height: 44px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .stat-card.purple .stat-icon { background: rgba(108, 99, 255, 0.15); color: var(--accent-primary); }
        .stat-card.green .stat-icon { background: rgba(16, 185, 129, 0.15); color: var(--accent-success); }
        .stat-card.blue .stat-icon { background: rgba(59, 130, 246, 0.15); color: var(--accent-info); }
        .stat-card.amber .stat-icon { background: rgba(245, 158, 11, 0.15); color: var(--accent-warning); }

        .stat-icon i { width: 22px; height: 22px; }

        .stat-value {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* ─── BUTTONS ─────────────────────────────────────────── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            white-space: nowrap;
        }

        .btn i { width: 18px; height: 18px; }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent-primary), #7c73ff);
            color: white;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px var(--accent-glow);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--accent-success), #34d399);
            color: white;
            box-shadow: 0 4px 15px var(--accent-success-glow);
        }

        .btn-success:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 25px var(--accent-success-glow);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--accent-danger), #f87171);
            color: white;
        }

        .btn-danger:hover {
            transform: translateY(-1px);
        }

        .btn-outline {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-outline:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
            background: rgba(108, 99, 255, 0.05);
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: 13px;
        }

        .btn-lg {
            padding: 14px 28px;
            font-size: 16px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ─── FORMS ───────────────────────────────────────────── */
        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            transition: var(--transition);
            outline: none;
        }

        .form-input:focus, .form-select:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-input::placeholder {
            color: var(--text-muted);
        }

        .form-select option {
            background: var(--bg-card);
            color: var(--text-primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        /* ─── TABLES ──────────────────────────────────────────── */
        .table-container {
            overflow-x: auto;
            border-radius: var(--radius-md);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead th {
            padding: 12px 16px;
            text-align: left;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            background: var(--bg-input);
            border-bottom: 1px solid var(--border);
        }

        tbody td {
            padding: 12px 16px;
            font-size: 14px;
            border-bottom: 1px solid var(--border);
            color: var(--text-secondary);
        }

        tbody tr:hover {
            background: rgba(108, 99, 255, 0.03);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* ─── BADGES ──────────────────────────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .badge-success {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-success);
        }

        .badge-danger {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-danger);
        }

        .badge-warning {
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent-warning);
        }

        .badge-info {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-info);
        }

        /* ─── ALERTS ──────────────────────────────────────────── */
        .alert {
            padding: 16px 20px;
            border-radius: var(--radius-md);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
            animation: slideIn 0.3s ease;
        }

        .alert i { width: 20px; height: 20px; flex-shrink: 0; }

        .alert-success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #34d399;
        }

        .alert-error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .alert-warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
            color: #fbbf24;
        }

        .alert-info {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #60a5fa;
        }

        /* ─── MODAL ───────────────────────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            width: 90%;
            max-width: 500px;
            max-height: 80vh;
            overflow-y: auto;
            animation: modalSlide 0.3s ease;
        }

        .modal-header {
            padding: 24px 24px 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 700;
        }

        .modal-close {
            width: 32px; height: 32px;
            border: none;
            background: var(--bg-input);
            border-radius: var(--radius-sm);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .modal-close:hover {
            background: var(--accent-danger);
            color: white;
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            padding: 0 24px 24px;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        /* ─── SCANNER SPECIFIC ────────────────────────────────── */
        .scanner-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: #000;
            aspect-ratio: 1;
        }

        .scanner-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scanner-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .scanner-frame {
            width: 65%;
            aspect-ratio: 1;
            border: 2px solid rgba(108, 99, 255, 0.6);
            border-radius: var(--radius-md);
            position: relative;
            animation: scanPulse 2s ease-in-out infinite;
        }

        .scanner-frame::before,
        .scanner-frame::after {
            content: '';
            position: absolute;
            width: 30px; height: 30px;
        }

        .scanner-frame::before {
            top: -2px; left: -2px;
            border-top: 3px solid var(--accent-primary);
            border-left: 3px solid var(--accent-primary);
            border-radius: 4px 0 0 0;
        }

        .scanner-frame::after {
            top: -2px; right: -2px;
            border-top: 3px solid var(--accent-primary);
            border-right: 3px solid var(--accent-primary);
            border-radius: 0 4px 0 0;
        }

        .scanner-corners-bottom {
            position: absolute;
            width: 65%;
            aspect-ratio: 1;
        }

        .scanner-corners-bottom::before,
        .scanner-corners-bottom::after {
            content: '';
            position: absolute;
            width: 30px; height: 30px;
        }

        .scanner-corners-bottom::before {
            bottom: -2px; left: -2px;
            border-bottom: 3px solid var(--accent-primary);
            border-left: 3px solid var(--accent-primary);
            border-radius: 0 0 0 4px;
        }

        .scanner-corners-bottom::after {
            bottom: -2px; right: -2px;
            border-bottom: 3px solid var(--accent-primary);
            border-right: 3px solid var(--accent-primary);
            border-radius: 0 0 4px 0;
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            animation: scanLine 2s ease-in-out infinite;
        }

        @keyframes scanPulse {
            0%, 100% { box-shadow: 0 0 20px rgba(108, 99, 255, 0.2); }
            50% { box-shadow: 0 0 40px rgba(108, 99, 255, 0.4); }
        }

        @keyframes scanLine {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        /* ─── SCAN RESULT CARD ────────────────────────────────── */
        .scan-result {
            padding: 20px;
            border-radius: var(--radius-md);
            margin-top: 20px;
            animation: slideIn 0.4s ease;
        }

        .scan-result.success {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .scan-result.error {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .scan-result.warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .student-info-card {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 8px 16px;
            margin-top: 12px;
        }

        .student-info-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .student-info-value {
            font-size: 14px;
            color: var(--text-primary);
            font-weight: 500;
        }

        /* ─── QR GRID ─────────────────────────────────────────── */
        .qr-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
        }

        .qr-card {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px;
            text-align: center;
            transition: var(--transition);
        }

        .qr-card:hover {
            border-color: var(--accent-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .qr-card img {
            width: 100%;
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
        }

        .qr-card-name {
            font-size: 12px;
            color: var(--text-secondary);
            word-break: break-all;
        }

        /* ─── FILE UPLOAD ─────────────────────────────────────── */
        .file-upload {
            border: 2px dashed var(--border);
            border-radius: var(--radius-lg);
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
        }

        .file-upload:hover {
            border-color: var(--accent-primary);
            background: rgba(108, 99, 255, 0.03);
        }

        .file-upload.dragover {
            border-color: var(--accent-primary);
            background: rgba(108, 99, 255, 0.08);
        }

        .file-upload i {
            width: 48px; height: 48px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .file-upload-text {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .file-upload-hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* ─── LIVE FEED ───────────────────────────────────────── */
        .live-feed {
            max-height: 400px;
            overflow-y: auto;
        }

        .feed-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            animation: slideIn 0.3s ease;
        }

        .feed-item:last-child { border-bottom: none; }

        .feed-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .feed-avatar.success {
            background: rgba(16, 185, 129, 0.15);
            color: var(--accent-success);
        }

        .feed-avatar.error {
            background: rgba(239, 68, 68, 0.15);
            color: var(--accent-danger);
        }

        .feed-avatar.timeout {
            background: rgba(59, 130, 246, 0.15);
            color: var(--accent-info);
        }

        .feed-avatar.late {
            background: rgba(245, 158, 11, 0.15);
            color: var(--accent-warning);
        }


        .feed-info {
            flex: 1;
            min-width: 0;
        }

        .feed-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .feed-detail {
            font-size: 12px;
            color: var(--text-muted);
        }

        .feed-time {
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'JetBrains Mono', monospace;
            flex-shrink: 0;
        }

        /* ─── SESSION CARD ────────────────────────────────────── */
        .session-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 16px;
            transition: var(--transition);
        }

        .session-card:hover {
            border-color: var(--border-hover);
        }

        .session-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .session-id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-primary);
        }

        .session-meta {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
        }

        .session-meta-item {
            font-size: 13px;
        }

        .session-meta-label {
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .session-meta-value {
            color: var(--text-primary);
            font-weight: 500;
            margin-top: 2px;
        }

        /* ─── EMPTY STATE ─────────────────────────────────────── */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state i {
            width: 64px; height: 64px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state h3 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 14px;
            max-width: 400px;
            margin: 0 auto;
        }

        /* ─── LOADING SPINNER ─────────────────────────────────── */
        .spinner {
            width: 20px; height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ─── ANIMATIONS ──────────────────────────────────────── */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes modalSlide {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ─── SCROLLBAR ───────────────────────────────────────── */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-primary);
        }

        /* ─── RESPONSIVE ──────────────────────────────────────── */
        .mobile-toggle {
            display: none;
            width: 40px; height: 40px;
            border: none;
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            cursor: pointer;
            align-items: center;
            justify-content: center;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }

            .mobile-toggle {
                display: flex;
            }

            .page-content {
                padding: 20px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .scanner-container {
                max-width: 100%;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ─── UTILITY ─────────────────────────────────────────── */
        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .text-muted { color: var(--text-muted); }
        .mt-1 { margin-top: 8px; }
        .mt-2 { margin-top: 16px; }
        .mt-3 { margin-top: 24px; }
        .mb-1 { margin-bottom: 8px; }
        .mb-2 { margin-bottom: 16px; }
        .mb-3 { margin-bottom: 24px; }
        .gap-2 { gap: 16px; }
        .flex { display: flex; }
        .flex-wrap { flex-wrap: wrap; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

        @media (max-width: 768px) {
            .grid-2 { grid-template-columns: 1fr; }
        }

        /* ─── TOAST NOTIFICATIONS ─────────────────────────────── */
        .toast-container {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 12px;
            pointer-events: none;
        }

        .toast-container .toast { pointer-events: auto; }

        .toast {
            padding: 16px 20px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: flex-start;
            gap: 14px;
            animation: toastSlide 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            min-width: 320px;
            max-width: 420px;
            box-shadow: var(--shadow-lg), 0 0 0 1px rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
        }

        .toast::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: rgba(255,255,255,0.4);
            animation: toastProgress var(--toast-duration, 4.5s) linear forwards;
        }

        .toast.success {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.92), rgba(5, 150, 105, 0.92));
            color: white;
        }
        .toast.success::after { background: rgba(255,255,255,0.5); }

        .toast.error {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.92), rgba(220, 38, 38, 0.92));
            color: white;
        }
        .toast.error::after { background: rgba(255,255,255,0.4); }

        .toast.warning {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.92), rgba(217, 119, 6, 0.92));
            color: white;
        }
        .toast.warning::after { background: rgba(255,255,255,0.45); }

        .toast.info {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.92), rgba(37, 99, 235, 0.92));
            color: white;
        }
        .toast.info::after { background: rgba(255,255,255,0.45); }

        .toast-icon {
            flex-shrink: 0;
            width: 24px;
            height: 24px;
            margin-top: 1px;
        }

        .toast-message { flex: 1; font-size: 14px; font-weight: 500; line-height: 1.45; }

        .toast-close {
            border: none;
            background: rgba(255,255,255,0.2);
            color: white;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .toast-close:hover { background: rgba(255,255,255,0.3); }
        .toast-close i { width: 14px; height: 14px; }

        @keyframes toastSlide {
            from { opacity: 0; transform: translateX(120px) scale(0.9); }
            to { opacity: 1; transform: translateX(0) scale(1); }
        }

        @keyframes toastProgress {
            from { width: 100%; }
            to { width: 0%; }
        }

        @media (max-width: 480px) {
            .toast-container { left: 16px; right: 16px; top: 16px; }
            .toast { min-width: auto; max-width: none; }
        }
    </style>
</head>
<body>

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <div class="brand-icon">
                <i data-lucide="qr-code"></i>
            </div>
            <div class="brand-text">
                QR Attend
                <span>Attendance System</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section">
                <div class="nav-section-title">Main</div>
                <a href="/" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" id="nav-dashboard">
                    <i data-lucide="layout-dashboard"></i>
                    Dashboard
                </a>
                <a href="/scanner" class="nav-link {% if request.endpoint == 'scanner_page' %}active{% endif %}" id="nav-scanner">
                    <i data-lucide="scan"></i>
                    Scanner
                </a>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">Management</div>
                <a href="/sessions" class="nav-link {% if request.endpoint == 'sessions_page' %}active{% endif %}" id="nav-sessions">
                    <i data-lucide="calendar-clock"></i>
                    Sessions
                </a>
                <a href="/generate" class="nav-link {% if request.endpoint == 'generate_page' %}active{% endif %}" id="nav-generate">
                    <i data-lucide="wand-2"></i>
                    Generate QR
                </a>
                <a href="/records" class="nav-link {% if request.endpoint == 'records_page' %}active{% endif %}" id="nav-records">
                    <i data-lucide="file-spreadsheet"></i>
                    Records
                </a>
                <a href="/students" class="nav-link {% if request.endpoint == 'students_page' %}active{% endif %}" id="nav-students">
                    <i data-lucide="users"></i>
                    Students
                </a>
            </div>
        </nav>

        <div class="sidebar-footer">
            <p>QR Attendance System v1.0</p>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Top Bar -->
        <header class="topbar">
            <div style="display: flex; align-items: center; gap: 12px;">
                <button class="mobile-toggle" onclick="toggleSidebar()" id="btn-mobile-menu">
                    <i data-lucide="menu"></i>
                </button>
                <h1 class="topbar-title">{% block page_title %}Dashboard{% endblock %}</h1>
            </div>
            <div class="topbar-actions">
                <div class="topbar-time" id="liveTime"></div>
            </div>
        </header>

        <!-- Page Content -->
        <div class="page-content">
            {% block content %}{% endblock %}
        </div>
    </main>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        // Live clock
        function updateTime() {
            const now = new Date();
            const options = {
                weekday: 'short',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            };
            document.getElementById('liveTime').textContent = now.toLocaleDateString('en-US', options);
        }
        updateTime();
        setInterval(updateTime, 1000);

        // Mobile sidebar toggle
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // Toast notifications (uses Lucide SVG icons)
        function showToast(message, type = 'success', duration = 4500) {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;

            const icons = {
                success: 'check-circle',
                error: 'x-circle',
                warning: 'alert-triangle',
                info: 'info'
            };
            const icon = icons[type] || 'info';

            toast.innerHTML = `
                <span class="toast-icon"><i data-lucide="${icon}"></i></span>
                <span class="toast-message">${escapeHtml(message)}</span>
                <button class="toast-close" onclick="dismissToast(this.parentElement)" aria-label="Close">
                    <i data-lucide="x"></i>
                </button>
            `;

            container.appendChild(toast);
            lucide.createIcons();

            toast.style.setProperty('--toast-duration', (duration / 1000) + 's');
            toast._dismissTimer = setTimeout(() => dismissToast(toast), duration);
        }

        function dismissToast(toast) {
            if (toast._dismissTimer) clearTimeout(toast._dismissTimer);
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(120px) scale(0.95)';
            toast.style.transition = 'all 0.25s ease';
            setTimeout(() => toast.remove(), 250);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // API helper
        async function apiCall(url, method = 'GET', data = null) {
            const options = {
                method,
                headers: { 'Content-Type': 'application/json' }
            };
            if (data) options.body = JSON.stringify(data);

            const response = await fetch(url, options);
            return await response.json();
        }
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
