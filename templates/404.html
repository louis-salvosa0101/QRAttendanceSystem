{% extends "base.html" %}
{% block title %}Page Not Found - QR Attendance System{% endblock %}
{% block page_title %}404{% endblock %}

{% block content %}
<div style="display:flex;align-items:center;justify-content:center;min-height:60vh;">
    <div class="empty-state" style="padding:40px 20px;">
        <div style="width:80px;height:80px;border-radius:var(--radius-lg);background:rgba(239,68,68,0.08);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
            <i data-lucide="file-x" style="width:40px;height:40px;color:var(--accent-danger);opacity:0.8;"></i>
        </div>
        <h3 style="font-size:22px;margin-bottom:8px;">Page Not Found</h3>
        <p style="font-size:14px;margin-bottom:24px;max-width:360px;">The page you're looking for doesn't exist or has been moved.</p>
        <a href="/" class="btn btn-primary">
            <i data-lucide="arrow-left"></i>
            Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
