<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - QR Attendance System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        :root {
            --bg-primary: #EFF6FF;
            --bg-card: #ffffff;
            --bg-input: #f8fafc;
            --accent-primary: #2563EB;
            --accent-secondary: #3B82F6;
            --accent-glow: rgba(37, 99, 235, 0.15);
            --accent-danger: #ef4444;
            --text-primary: #1E40AF;
            --text-secondary: #334155;
            --text-muted: #64748B;
            --border: #E2E8F0;
            --border-hover: #CBD5E1;
            --radius-sm: 8px;
            --radius-lg: 16px;
            --radius-xl: 20px;
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.08);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        :root.dark-theme {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --bg-input: #0f172a;
            --accent-primary: #3b82f6;
            --accent-secondary: #60a5fa;
            --accent-glow: rgba(59, 130, 246, 0.2);
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border: #334155;
            --border-hover: #475569;
            --shadow-lg: 0 10px 25px rgba(0,0,0,0.4);
        }

        body {
            font-family: 'Fira Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 40px 36px;
            box-shadow: var(--shadow-lg);
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 4px 20px var(--accent-glow);
        }

        .login-icon i { color: white; width: 32px; height: 32px; }

        .login-header h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.3px;
            margin-bottom: 6px;
        }

        .login-header p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .form-group { margin-bottom: 20px; }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'Fira Sans', sans-serif;
            font-size: 14px;
            transition: var(--transition);
            outline: none;
        }

        .form-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-input::placeholder { color: var(--text-muted); }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #F97316;
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Fira Sans', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-login:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        .btn-login:active { transform: translateY(0); }

        .btn-login i { width: 18px; height: 18px; }

        .error-msg {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: var(--accent-danger);
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .error-msg i { width: 18px; height: 18px; flex-shrink: 0; }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .theme-toggle-login {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 36px; height: 36px;
            border: 1px solid var(--border);
            background: var(--bg-card);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .theme-toggle-login:hover {
            border-color: var(--border-hover);
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }

        @media (max-width: 480px) {
            .login-card { padding: 28px 24px; }
        }
    </style>
</head>
<body>
    <button class="theme-toggle-login" onclick="toggleTheme()" aria-label="Toggle theme">
        <i data-lucide="moon" id="theme-icon"></i>
    </button>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <i data-lucide="shield-check"></i>
                </div>
                <h1>Officer Login</h1>
                <p>QR Attendance System</p>
            </div>

            {% if error %}
            <div class="error-msg">
                <i data-lucide="alert-circle"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <form method="POST" action="/login">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" class="form-input" name="username"
                           placeholder="Enter your username" required autofocus
                           value="{{ request.form.get('username', '') }}">
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" name="password"
                           placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-login">
                    <i data-lucide="log-in"></i>
                    Sign In
                </button>
            </form>

            <div class="login-footer">
                Only authorized officers can access this system.
            </div>
        </div>
    </div>
    <script>
        function initTheme() {
            const saved = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            if (saved === 'dark' || (!saved && prefersDark)) {
                document.documentElement.classList.add('dark-theme');
            }
            updateIcon();
        }
        function toggleTheme() {
            document.documentElement.classList.toggle('dark-theme');
            const isDark = document.documentElement.classList.contains('dark-theme');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            updateIcon();
        }
        function updateIcon() {
            const icon = document.getElementById('theme-icon');
            if (icon) {
                icon.setAttribute('data-lucide', document.documentElement.classList.contains('dark-theme') ? 'sun' : 'moon');
                lucide.createIcons();
            }
        }
        initTheme();
        lucide.createIcons();
    </script>
</body>
</html>
